<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Algebra Practice Platform</title>
</head>
<body>
  <header>
    <h1>Linear Algebra Practice Platform</h1>
    <nav aria-label="Main navigation">
      <button id="mock-exam-btn" type="button">Mock Exam</button>
      <button id="reset-progress-btn" type="button">Reset Progress</button>
    </nav>
  </header>

  <main>
    <aside id="sidebar" aria-label="Practice configuration">
      <div role="group" aria-labelledby="difficulty-heading">
        <h2 id="difficulty-heading">Difficulty</h2>
        <select id="difficulty-selector" aria-label="Select difficulty level">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <nav aria-label="Topics by week">
        <h2>Topics</h2>
        <ul id="topic-list">
          <li data-week="1"><button type="button">Week 1: Systems, Row Reduction, Vector Equations</button></li>
          <li data-week="2"><button type="button">Week 2: Solution Sets, Applications, Linear Independence</button></li>
          <li data-week="3"><button type="button">Week 3: Linear Transformations, Matrix Operations</button></li>
          <li data-week="4"><button type="button">Week 4: Inverse Matrices, Factorizations</button></li>
          <li data-week="5"><button type="button">Week 5: Determinants, Cramer’s Rule</button></li>
          <li data-week="6"><button type="button">Week 6: Vector Spaces, Subspaces, Null/Column Spaces</button></li>
          <li data-week="7"><button type="button">Week 7: Bases, Dimension, Coordinate Systems, Rank</button></li>
          <li data-week="8"><button type="button">Week 8: Change of Basis, Eigenvalues, Eigenvectors</button></li>
          <li data-week="9"><button type="button">Week 9: Diagonalization, Complex Eigenvalues</button></li>
          <li data-week="10"><button type="button">Week 10: Full Course Review & Mock Exam</button></li>
        </ul>
      </nav>

      <div role="group" aria-label="Practice mode">
        <h2>Mode</h2>
        <button id="mode-quiz" type="button">Quiz</button>
        <button id="mode-practice" type="button">Practice</button>
        <button id="mode-mock" type="button">Mock Exam</button>
      </div>
    </aside>

    <section id="main-content" aria-label="Problem workspace">
      <div id="score-panel" aria-label="Score summary">
        <span>Score: <span id="score-value">0</span></span>
        <span>Streak: <span id="streak-value">0</span></span>
        <span>Questions Attempted: <span id="attempts-value">0</span></span>
      </div>

      <div id="problem-card" aria-label="Problem card">
        <div id="problem-statement" aria-label="Problem statement"></div>

        <div id="hint-container" aria-live="polite">
          <p id="hint-text"></p>
        </div>

        <div class="answer-area">
          <label for="answer-input">Your answer:</label>
          <input type="text" id="answer-input" aria-label="Answer input field">
          <div class="button-row">
            <button id="check-btn" type="button">Check</button>
            <button id="hint-btn" type="button">Hint</button>
            <button id="next-btn" type="button">Next Problem</button>
          </div>
        </div>

        <div id="feedback-message" aria-live="assertive" aria-label="Feedback message"></div>
      </div>

      <div id="mock-timer-container" aria-label="Mock exam timer" hidden>
        <span>Time Left: <span id="timer-display">10:00</span></span>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
